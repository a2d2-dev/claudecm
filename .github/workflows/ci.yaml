name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cascade-cancel siblings: a single-cell failure was masking the
      # true state of the matrix and producing red rollups for jobs that
      # actually pass. Let every cell run to completion so real failures are
      # not conflated with fail-fast collateral.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.21', '1.22', '1.23']
        exclude:
          # macos-latest is currently macos-26-arm64 (Tahoe), whose dyld
          # strictly requires LC_UUID in every Mach-O binary. Go 1.21's
          # linker omits LC_UUID for some small test binaries (see
          # golang/go#64207); the fix was backported to 1.22 and 1.23 but
          # continues to intermittently misfire on tiny test binaries
          # (observed on internal/config.test whose Mach-O falls under
          # the LC_UUID emission threshold). To keep the cell honest we
          # route BOTH 1.21 and 1.22 to macos-14 (Sonoma) below, whose
          # dyld tolerates the missing load command. 1.23 has the fix
          # holding reliably in our matrix and stays on macos-latest.
          - os: macos-latest
            go-version: '1.21'
          - os: macos-latest
            go-version: '1.22'
        include:
          - os: macos-14
            go-version: '1.21'
          - os: macos-14
            go-version: '1.22'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage
      if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.21'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.out
        flags: unittests
        name: codecov-umbrella

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: os.Rename discipline
      run: bash scripts/lint-osrename.sh

    - name: Project-scope discipline
      run: bash scripts/lint-project-scope.sh

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: v1.55.2

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build
      run: make build

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: claudecm-${{ matrix.os }}
        path: bin/claudecm
